<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Titlu optimizat SEO -->
    <title>Hoco Romania | Accesorii Mobile Premium - Power Banks, Căști, Încărcătoare</title>
    
    <!-- Meta Descriere pentru Google -->
    <meta name="description" content="Hoco Romania - Partener Oficial. Descoperă gama completă de accesorii mobile premium: Power Banks 10000-30000mAh, Căști Audio Bluetooth, Încărcătoare Rapide PD20W-QC3.0, Cabluri și Accesorii Auto. Livrare 24-48h, Garanție 24 luni." />
    
    <!-- Cuvinte cheie -->
    <meta name="keywords" content="hoco romania, power bank, incarcator rapid, casti bluetooth, accesorii mobile, hoco original, incarcare wireless, cabluri type-c, incarcator auto, baterie externa" />
    
    <!-- Autor și Roboti -->
    <meta name="author" content="Hoco Romania Official Partner" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://hocoromania.store/" />
    
    <!-- Open Graph pentru Facebook/LinkedIn -->
    <meta property="og:title" content="Hoco Romania | Accesorii Mobile Premium" />
    <meta property="og:description" content="Partener Oficial Hoco. Gama completă de accesorii mobile premium: Power Banks, Căști Audio, Încărcătoare Rapide. Livrare rapidă 24-48h." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hocoromania.store/" />
    <meta property="og:site_name" content="Hoco Romania" />
    <meta property="og:locale" content="ro_RO" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hoco Romania | Accesorii Mobile Premium" />
    <meta name="twitter:description" content="Descoperă gama completă de accesorii mobile premium Hoco: Power Banks, Căști, Încărcătoare Rapide." />
    
    <!-- Theme Color pentru mobile -->
    <meta name="theme-color" content="#DC2626" />
    
    <!-- Preconnect pentru performanță -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Structured Data pentru Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Hoco Romania",
      "description": "Partener Oficial Hoco - Accesorii Mobile Premium",
      "url": "https://hocoromania.store",
      "logo": "https://hocoromania.store/favicon.svg",
      "image": "https://hocoromania.store/favicon.svg",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "RO"
      },
      "sameAs": []
    }
    </script>
    
    <style>
      body { 
        font-family: 'Inter', sans-serif; 
        margin: 0; 
        background-color: #ffffff;
      }
      /* Loading spinner */
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s;
      }
      #loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #DC2626;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loader">
      <div class="spinner"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Ascunde loader-ul după încărcare -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loader').classList.add('hidden');
        }, 300);
      });
    </script>
  </body>
</html>
